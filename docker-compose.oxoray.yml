version: "3.9"

# OXORAY sidecar — LinkedIn outbound prospecting
# Run: docker compose -f docker-compose.oxoray.yml up -d
# Docs: https://github.com/Anurag-M1/OXORAY

services:
  oxoray:
    image: ghcr.io/anurag-m1/oxoray:latest
    container_name: oxoray
    restart: unless-stopped
    ports:
      - "8090:8090"   # OXORAY dashboard (Next.js)
      - "8091:8091"   # OXORAY API (FastAPI)
    environment:
      # LinkedIn credentials — use a dedicated account, not your primary
      LINKEDIN_EMAIL: ${OXORAY_LINKEDIN_EMAIL}
      LINKEDIN_PASSWORD: ${OXORAY_LINKEDIN_PASSWORD}

      # LLM for AI conversation agent (supports OpenAI and Anthropic)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_PROVIDER: anthropic
      LLM_MODEL: claude-sonnet-4-6

      # Webhook — fire to toolkit when events occur
      WEBHOOK_URL: ${TOOLKIT_BASE_URL}/v1/linkedin/webhook
      WEBHOOK_API_KEY: ${API_KEY}

      # Safety limits — stay well under LinkedIn's daily thresholds
      MAX_CONNECTIONS_PER_DAY: 20
      MAX_MESSAGES_PER_DAY: 30
      CONNECTION_DELAY_MIN_SECONDS: 120
      CONNECTION_DELAY_MAX_SECONDS: 300
      MESSAGE_DELAY_MIN_SECONDS: 60
      MESSAGE_DELAY_MAX_SECONDS: 180

      # Calendly link injected into AI agent conversation flow
      CALENDLY_URL: ${CALENDLY_URL}

    volumes:
      - oxoray_data:/app/data
      - ./oxoray-campaign.json:/app/campaigns/flow-program.json:ro

    networks:
      - toolkit_network

volumes:
  oxoray_data:

networks:
  toolkit_network:
    external: true
    name: no-code-architects-toolkit_default
